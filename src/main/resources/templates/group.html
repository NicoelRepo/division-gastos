<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${group.name}">Grupo</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>
<main class="shell">
    <section class="page-heading">
        <div>
            <h1 th:text="${group.name}">Grupo</h1>
            <p th:text="${#lists.size(group.members)} + ' miembros'">0 miembros</p>
        </div>
        <a class="button secondary" th:href="@{/groups/{id}/settlement(id=${group.id.value})}">Ver settlement</a>
    </section>

    <p class="alert" th:if="${error}" th:text="${error}"></p>

    <section class="grid two">
        <div>
            <h2>Miembros</h2>
            <form class="inline-form" method="post" th:action="@{/groups/{id}/members(id=${group.id.value})}">
                <input name="name" placeholder="Nombre" required>
                <button type="submit">Agregar</button>
            </form>
            <ul class="compact-list">
                <li th:each="member : ${group.members}" th:text="${member.name}">Miembro</li>
            </ul>
        </div>

        <div>
            <h2>Nuevo gasto</h2>
            <form class="stack-form" method="post" th:action="@{/groups/{id}/expenses(id=${group.id.value})}" th:object="${expenseForm}">
                <label>
                    Descripcion
                    <input th:field="*{description}" placeholder="Cena, taxi, supermercado" required>
                </label>
                <label>
                    Monto
                    <input th:field="*{amount}" type="number" min="0.01" step="0.01" required>
                </label>
                <label>
                    Pagador
                    <select th:field="*{payerId}" required>
                        <option value="">Seleccionar</option>
                        <option th:each="member : ${group.members}" th:value="${member.id.value}" th:text="${member.name}"></option>
                    </select>
                </label>
                <fieldset>
                    <legend>Participantes</legend>
                    <label class="check-row" th:each="member : ${group.members}">
                        <input type="checkbox" th:field="*{participantIds}" th:value="${member.id.value}">
                        <span th:text="${member.name}">Miembro</span>
                    </label>
                </fieldset>
                <button type="submit" th:disabled="${#lists.isEmpty(group.members)}">Cargar gasto</button>
            </form>
        </div>
    </section>

    <section>
        <h2>Gastos</h2>
        <p class="empty-state" th:if="${#lists.isEmpty(expenses)}">Todavia no hay gastos cargados.</p>
        <table th:if="${!#lists.isEmpty(expenses)}">
            <thead>
            <tr>
                <th>Fecha</th>
                <th>Descripcion</th>
                <th>Pagador</th>
                <th>Participantes</th>
                <th>Monto</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="expense : ${expenses}">
                <td th:text="${expense.date}">2026-01-01</td>
                <td th:text="${expense.description}">Gasto</td>
                <td th:text="${expense.payerName}">Pagador</td>
                <td th:text="${#strings.listJoin(expense.participantNames, ', ')}">Participantes</td>
                <td th:text="${currency} + ' ' + ${expense.amount}">ARS 0.00</td>
            </tr>
            </tbody>
        </table>
    </section>
</main>
</body>
</html>
